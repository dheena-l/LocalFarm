<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Local Farm | Fresh Organic Vegetables & Fruits</title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="Local Farm provides fresh organic vegetables, fruits, and natural farm products directly from farmers."
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="local farm, organic vegetables, fresh fruits, farm products"
    />

    <!-- Author -->
    <meta name="author" content="Local Farm" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/field.png" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Local Farm" />
    <meta
      property="og:description"
      content="Fresh organic farm products directly from local farmers."
    />
    <meta property="og:image" content="/field.png" />
    <meta property="og:type" content="website" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#4CAF50" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com/" />
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
